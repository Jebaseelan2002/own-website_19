<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
           body {
    font-family: Arial;
    margin: 0;
    background-image: url("https://images.pexels.com/photos/325185/pexels-photo-325185.jpeg"); /* your image path */
    background-size: cover;             /* makes image fill screen */
    background-repeat: no-repeat;       /* prevents repeating */
    background-position: center;        /* centers the image */
}

        .container {
            width: 400px;
            margin: 60px auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; }

        label { font-weight: bold; }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Contact Us</h2>

    <!-- ✅ FIXED FORM -->
    <form method="POST" action="/contact">

        <label>Full Name</label>
        <input type="text" name="name" placeholder="Enter your name" required>

        <label>Email Address</label>
        <input type="email" name="email" placeholder="Enter your email" required>

        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="Enter your phone number">

        <label>Message</label>
        <textarea name="message" rows="4" placeholder="Write your message"></textarea>

        <button type="submit">Send Message</button>

    </form>
</div>

</body>
</html>
